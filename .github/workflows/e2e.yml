# E2E for the bewaire-source *signal* path: GitHub PR → Kafka → bewaire-consumer → bewaire-api → verdict logs
#
# Long-lived branches + PRs into `main` (do not delete the branches):
#   - `bewaire-source-e2e/signal-benign`
#   - `bewaire-source-e2e/signal-malicious`
#
# Actions variables:
#   - `BEWAIRE_SOURCE_SIGNAL_E2E_PR_BENIGN` — PR number (benign)
#   - `BEWAIRE_SOURCE_SIGNAL_E2E_PR_MALICIOUS` — PR number (malicious)
#
# Canonical demo files live on **main** under `.github/bewaire-source-signal-e2e/templates/<kind>/`.
# Each run (per PR): if **closed**, align head to `headRefOid` and **reopen** before any push. If
# **open**, push immediately (no pre-close). Then templates + stamp, commit, **push while open**,
# **close** (synchronize on push while open; close at end).
name: Bewaire source signal E2E (synthetic PR)

on:
  schedule:
    # Hourly (aligns with 1h staging log monitor evaluation window).
    - cron: "47 * * * *"
  workflow_dispatch:

permissions: {}

jobs:
  synthetic-pr-cycle:
    runs-on: ubuntu-latest
    env:
      BEWAIRE_SOURCE_SIGNAL_E2E_PR_BENIGN: ${{ vars.BEWAIRE_SOURCE_SIGNAL_E2E_PR_BENIGN }}
      BEWAIRE_SOURCE_SIGNAL_E2E_PR_MALICIOUS: ${{ vars.BEWAIRE_SOURCE_SIGNAL_E2E_PR_MALICIOUS }}
    permissions:
      id-token: write # required for dd-octo-sts (GitHub OIDC)
    steps:
      - id: octo-sts
        uses: DataDog/dd-octo-sts-action@96a25462dbcb10ebf0bfd6e2ccc917d2ab235b9a # v1.0.4
        with:
          scope: DataDog/bewAIre-of-changes
          policy: gha.bewaire-source-signal-e2e

      - name: Checkout (Octo token — fetch + push to e2e branches)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ steps.octo-sts.outputs.token }}

      - name: Fixed PRs — resilient cycle (gh + git)
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          set -euo pipefail

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          emit_consumer_log_hint() {
            local kind="$1" pr_url="$2" pr_num="$3"
            echo ""
            echo "-------- Monitor bewaire-consumer (staging) - ${kind} PR #${pr_num} (fixed) --------"
            echo "PR: ${pr_url}"
            echo "Consumer emits e.g. \"pull request scanned with bewaire\" with structured fields such as response.verdict / response.reason."
            echo "Log search (tune time window to this job):"
            echo "  service:bewaire-consumer \"pull request scanned with bewaire\""
            echo "------------------------------------------------------------------"
          }

          apply_template_and_push() {
            local kind="$1" br="$2"
            local tpl_root=".github/bewaire-source-signal-e2e/templates/${kind}"

            git fetch origin main
            git fetch origin "$br" 2>/dev/null || true

            if [ -n "$(git ls-remote origin "refs/heads/${br}")" ]; then
              git fetch origin "$br"
              echo "bewaire-source-e2e: committing on top of existing head origin/${br}"
              git checkout -B "$br" "origin/${br}"
            else
              echo "bewaire-source-e2e: bootstrapping ${br} from origin/main (no remote head yet)"
              git checkout -B "$br" "origin/main"
            fi

            rm -rf e2e
            mkdir -p e2e

            case "$kind" in
              benign)
                git show "origin/main:${tpl_root}/pr_demo_benign.js" > e2e/pr_demo_benign.js
                ;;
              malicious)
                git show "origin/main:${tpl_root}/pr_demo_exercise_path.js" > e2e/pr_demo_exercise_path.js
                ;;
              *) echo "unknown kind: $kind" >&2; exit 1 ;;
            esac

            {
              echo "github.run_id=${GITHUB_RUN_ID}"
              echo "utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            } > e2e/.bewaire_source_signal_e2e_stamp

            git add e2e
            git commit -m "bewaire-source-signal-e2e: cycle run ${GITHUB_RUN_ID}"
            git push --force-with-lease origin "refs/heads/${br}"

            git checkout main
          }

          demo_cycle() {
            local kind="$1"
            local br="bewaire-source-e2e/signal-${kind}"

            local pr_num merged_at state
            case "$kind" in
              benign) pr_num="${BEWAIRE_SOURCE_SIGNAL_E2E_PR_BENIGN:-}" ;;
              malicious) pr_num="${BEWAIRE_SOURCE_SIGNAL_E2E_PR_MALICIOUS:-}" ;;
              *) echo "unknown kind: $kind" >&2; exit 1 ;;
            esac
            if [ -z "$pr_num" ]; then
              echo "bewaire-source-e2e: Set Actions variable BEWAIRE_SOURCE_SIGNAL_E2E_PR_${kind^^} to this PR's number (repo or org Variables)." >&2
              exit 1
            fi

            local head_actual
            head_actual="$(gh pr view "$pr_num" --json headRefName | jq -r '.headRefName')"
            if [ "$head_actual" != "$br" ]; then
              echo "bewaire-source-e2e: PR #${pr_num} has head \`${head_actual}\`; expected \`${br}\`. Fix the variable or the PR." >&2
              exit 1
            fi

            merged_at="$(gh pr view "$pr_num" --json mergedAt | jq -r '.mergedAt')"
            if [ -n "$merged_at" ] && [ "$merged_at" != "null" ]; then
              echo "bewaire-source-e2e: PR #${pr_num} (head ${br}) is merged; cannot reuse fixed-PR flow. Open a new PR from the same head branch or fix manually." >&2
              exit 1
            fi

            state="$(gh pr view "$pr_num" --json state | jq -r '.state')"
            if [ "$state" = "CLOSED" ]; then
              echo "bewaire-source-e2e: PR #${pr_num} is closed; aligning head + reopening before push."
              git fetch origin main
              want_oid="$(gh pr view "$pr_num" --json headRefOid | jq -r '.headRefOid')"
              if [ -z "$want_oid" ] || [ "$want_oid" = "null" ]; then
                echo "bewaire-source-e2e: could not read headRefOid for PR #${pr_num}" >&2
                exit 1
              fi
              remote_line="$(git ls-remote origin "refs/heads/${br}")"
              remote_sha=""
              if [ -n "$remote_line" ]; then
                remote_sha="$(printf '%s\n' "$remote_line" | awk '{print $1}')"
              fi
              if [ -z "$remote_sha" ]; then
                echo "bewaire-source-e2e: restoring ${br} at PR head ${want_oid}"
                git fetch origin "$want_oid" 2>/dev/null || true
                git push origin "${want_oid}:refs/heads/${br}"
              elif [ "$remote_sha" != "$want_oid" ]; then
                echo "bewaire-source-e2e: repointing ${br} to PR head ${want_oid} (remote was ${remote_sha})"
                git fetch origin "$want_oid" 2>/dev/null || true
                git push --force-with-lease="refs/heads/${br}:${remote_sha}" origin "${want_oid}:refs/heads/${br}"
              fi

              cur="$(gh pr view "$pr_num" --json state | jq -r '.state')"
              if [ "$cur" != "OPEN" ]; then
                echo "bewaire-source-e2e: opening PR #${pr_num} (${kind}, head ${br}) via REST."
                printf '%s\n' '{"state":"open"}' | gh api --method PATCH \
                  -H "Accept: application/vnd.github+json" \
                  "repos/${GITHUB_REPOSITORY}/pulls/${pr_num}" --input -
              fi
            elif [ "$state" = "OPEN" ]; then
              echo "bewaire-source-e2e: PR #${pr_num} already open; pushing then closing (no pre-close)."
            else
              echo "bewaire-source-e2e: PR #${pr_num} unexpected state: ${state}" >&2
              exit 1
            fi

            apply_template_and_push "$kind" "$br"

            gh pr close "$pr_num" --comment "bewaire-source-e2e: cycle finished (run ${GITHUB_RUN_ID}). **Do not delete head branch \`${br}\`.**"

            local pr_url
            pr_url="$(gh pr view "$pr_num" --json url | jq -r '.url')"
            emit_consumer_log_hint "$kind" "$pr_url" "$pr_num"
          }

          echo "bewaire-source-e2e: run_id=${GITHUB_RUN_ID} (PRs: ${BEWAIRE_SOURCE_SIGNAL_E2E_PR_BENIGN:-?} benign / ${BEWAIRE_SOURCE_SIGNAL_E2E_PR_MALICIOUS:-?} malicious)"

          demo_cycle benign
          demo_cycle malicious

          echo "bewaire-source-e2e: benign + malicious cycles finished."
